apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-postgresql
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # After operator
  labels:
    app.kubernetes.io/component: postgresql
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: postgresql
      targetRevision: 13.2.26
      helm:
        valueFiles:
          - $values-repo/postgresql/values.yaml
    - repoURL: https://github.com/padminisys/keycloak-ops.git
      targetRevision: HEAD
      ref: values-repo
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: keycloak
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - Replace=false     # ADDED
      - ApplyOutOfSyncOnly=true  # ADDED — only sync drifted resources      
  revisionHistoryLimit: 10
  ignoreDifferences:                          # ADDED — entire block
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec
        - /metadata
    - group: ""
      kind: PersistentVolume
      jsonPointers:
        - /spec
        - /metadata  
