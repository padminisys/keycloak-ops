apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-instance
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"  # After certificates
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/padminisys/keycloak-ops.git
    targetRevision: HEAD
    path: keycloak/instances
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - Replace=false     # ADDED      
  revisionHistoryLimit: 10
  ignoreDifferences:                          # ADDED
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/replicas       # operator manages this
    - group: networking.k8s.io
      kind: Ingress
      name: padmini-keycloak-ingress
      jsonPointers:
        - /spec/tls            # you patch this manually per runbook  
